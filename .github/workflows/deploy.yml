name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build, lint & integration test
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck || true

      - name: Build frontend
        run: PORT=3000 BASE_PATH=/ pnpm --filter @workspace/bintunet run build
        env:
          NODE_ENV: production

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      - name: Setup test environment
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q ffmpeg python3 python3-pip
          pip3 install --quiet streamlink
          sudo curl -fsSL \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          mkdir -p artifacts/api-server/uploads
          mkdir -p artifacts/api-server/tmp_overlay

      - name: Start test server
        run: |
          NODE_ENV=production \
          PORT=8080 \
          SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
          GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
          node --enable-source-maps artifacts/api-server/dist/index.mjs &
          echo $! > /tmp/server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/auth/check > /dev/null 2>&1; then
              echo "Test server ready"
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        run: |
          cloudflared tunnel --url http://localhost:8080 \
            --no-autoupdate \
            2>&1 | tee /tmp/tunnel.log &
          echo $! > /tmp/tunnel.pid
          for i in $(seq 1 30); do
            EP=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$EP" ]; then
              echo "Integration endpoint: $EP"
              echo "TEST_ENDPOINT=$EP" >> $GITHUB_ENV
              break
            fi
            sleep 1
          done
          if [ -z "$EP" ]; then
            echo "Tunnel setup failed"
            cat /tmp/tunnel.log
            exit 1
          fi

          # Validate endpoint health
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" "$EP/api/auth/check")
          echo "Health check: $HTTP"

          # Run extended integration test suite
          START=$(date +%s)
          while kill -0 $(cat /tmp/server.pid) 2>/dev/null && \
                kill -0 $(cat /tmp/tunnel.pid) 2>/dev/null; do
            NOW=$(date +%s)
            ELAPSED=$(( NOW - START ))
            if [ $(( ELAPSED % 300 )) -lt 5 ]; then
              echo "$(date -u '+%H:%M:%S') Tests running — elapsed ${ELAPSED}s"
            fi
            sleep 10
          done

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/server.pid) 2>/dev/null || true
          kill $(cat /tmp/tunnel.pid) 2>/dev/null || true
          pnpm store prune
          rm -rf artifacts/api-server/dist
          rm -rf artifacts/bintunet/dist
